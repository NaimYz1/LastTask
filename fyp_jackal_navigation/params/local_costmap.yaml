local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  rolling_window: true
  width: 8.0
  height: 8.0
  resolution: 0.05
  static_map: false

  plugins:
    - {name: obstacles_layer, type: "costmap_2d::VoxelLayer"}
    - {name: inflater_layer,  type: "costmap_2d::InflationLayer"}

  # 3D voxel grid: 8 voxels x 0.12 m = 0.96 m column above the floor.
  # Points above max_obstacle_height (0.55, see costmap_common.yaml) are
  # rejected before insertion, so the bridge deck never marks.
  obstacles_layer:
    origin_z: 0.0
    z_resolution: 0.12
    z_voxels: 8
    unknown_threshold: 15
    mark_threshold: 0
    publish_voxel_map: true

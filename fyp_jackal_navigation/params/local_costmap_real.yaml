# REAL ROBOT local costmap.
# Uses the plain 2D ObstacleLayer instead of the VoxelLayer: all 3D height
# reasoning already happened in the mid360_filter node (relative to
# base_link), and this robot's EKF odometry drifts in z (observed -0.22 m),
# which pushes the sensor origin below a voxel grid's z-range and silently
# breaks raytrace clearing. The 2D layer has no z-grid, so it is immune.
local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  rolling_window: true
  # 5x5 m is ample lookahead at <=0.5 m/s and roughly halves the map-update
  # and TEB obstacle load (8x8 contributed to CPU overload with TEB).
  width: 5.0
  height: 5.0
  resolution: 0.05
  static_map: false

  plugins:
    - {name: obstacles_scan,   type: "costmap_2d::ObstacleLayer"}
    - {name: obstacles_mid360, type: "costmap_2d::ObstacleLayer"}
    - {name: inflater_layer,   type: "costmap_2d::InflationLayer"}

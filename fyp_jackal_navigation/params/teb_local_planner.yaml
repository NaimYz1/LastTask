# TEB local planner - smooth car-like arcs instead of tank pivots.
# Selected with planner:=teb (requires: sudo apt-get install ros-melodic-teb-local-planner)
# Tuned for the 0.70 m demo corridor: homotopy exploration OFF (one
# committed trajectory, no side-to-side indecision), via-points glue the
# trajectory to the global path (the corridor centre line), strong
# forward-drive preference (reversing only when genuinely needed).
TebLocalPlannerROS:
  odom_topic: odometry/filtered

  # Trajectory
  teb_autosize: true
  dt_ref: 0.3
  dt_hysteresis: 0.1
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: false
  max_global_plan_lookahead_dist: 2.0
  feasibility_check_no_poses: 3
  global_plan_viapoint_sep: 0.3

  # Robot kinematics
  max_vel_x: 0.4
  # Reversing: discouraged but NOT forbidden. With it effectively banned
  # (0.05 / weight 1000) a robot parked close to furniture had no legal
  # escape - every forward pose was in collision and TEB spammed
  # "trajectory is not feasible" forever. 0.12 with weight 300 keeps legs
  # from starting backwards yet allows a slow escape shuffle.
  max_vel_x_backwards: 0.12
  max_vel_theta: 1.0
  acc_lim_x: 1.0
  acc_lim_theta: 2.0
  # 0.0 = diff-drive (can still pivot when truly required, but the
  # optimizer strongly prefers smooth arcs). Set 0.15-0.30 for strictly
  # car-like motion - note the robot then needs multi-point turns to
  # reverse direction in the open areas. Do NOT exceed ~0.3 on this course:
  # a radius R needs a 2R-diameter circle to turn, and the constraint is
  # soft (the optimizer oscillates when it cannot be satisfied).
  min_turning_radius: 0.0
  footprint_model:
    type: polygon
    vertices: [[-0.26, -0.215], [-0.26, 0.215], [0.26, 0.215], [0.26, -0.215]]

  # Goal tolerance
  xy_goal_tolerance: 0.2
  yaw_goal_tolerance: 0.3
  free_goal_vel: false

  # Obstacles (distances measured from the polygon edge). 0.08 gives a
  # little slack against under-marked obstacles (glossy/curved surfaces
  # return weak grazing hits) while still fitting the 0.70 m corridor
  # (0.135 m wall clearance per side when centred).
  min_obstacle_dist: 0.08
  inflation_dist: 0.15
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 20

  # CRITICAL for CPU: without a converter, EVERY occupied costmap cell is a
  # separate obstacle in the optimizer - in a cluttered lab that overloaded
  # the control loop (0.2 s cycles), starved AMCL, and the robot
  # delocalized mid-run.
  # POLYGONS, not lines: the lines converter (CostmapToLinesDBSRANSAC)
  # silently dropped small isolated obstacles (a lone box marks ~5-10
  # cells, which is not a line) - the costmap and RViz showed them but TEB
  # never received them and drove straight through. Convex-hull polygons
  # keep every cluster, however small.
  costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
  costmap_converter_spin_thread: true
  costmap_converter_rate: 5
  costmap_converter/CostmapToPolygonsDBSMCCH:
    cluster_max_distance: 0.4
    cluster_min_pts: 2
    cluster_max_pts: 700
    convex_hull_min_pt_separation: 0.1

  # Optimization weights
  no_inner_iterations: 5
  no_outer_iterations: 4
  # must stay below max_vel_x_backwards (0.05) or TEB warns about a
  # negative bound / undefined behavior
  penalty_epsilon: 0.03
  weight_max_vel_x: 2.0
  weight_max_vel_theta: 1.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 300.0
  weight_kinematics_turning_radius: 1.0
  weight_optimaltime: 1.0
  weight_obstacle: 50.0
  weight_inflation: 0.1
  weight_viapoint: 1.0

  # One trajectory, committed - no parallel-hypothesis flip-flopping.
  enable_homotopy_class_planning: false
  enable_multithreading: true

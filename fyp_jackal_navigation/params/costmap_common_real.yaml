# REAL ROBOT costmap configuration (Jackal cpr-j100-0540).
# Matches what the robot actually publishes (checked 2026-07-13):
#   * Hokuyo via urg_node:  topic /scan,        frame "laser"  (~0.35 m high)
#   * Mid-360 via livox driver: topic /livox/lidar, frame "livox_frame"
#     (PointCloud2; static TF base_link->livox_frame comes from nav_real.launch)
#
# Robot height: ~0.50 m (top of the Mid-360). Clearance = 0.60 m:
#   * real bridge deck at ~0.75 m  -> above 0.60 -> ignored -> drives under
#   * anything lower than 0.60 m   -> marked     -> avoided
#
# The real bridge opening is only ~1.0 m wide (robot 0.43 m + sensors), so
# footprint_padding and inflation_radius are tighter than in simulation --
# with the sim values the inflated cost would nearly close the gap.
#
# min_obstacle_height 0.15: real floors are uneven and the mount calibration
# is imperfect; raise to 0.20 if the floor still marks as an obstacle.

# padding 0.07: the local planner only hard-rejects the footprint BORDER
# touching LETHAL cells on a 5 cm grid in the odom frame - during tight
# maneuvers, grid discretization + skid-steer slip eat ~5 cm, so 5 cm
# padding led to body brushes. 0.07 restores real margin while keeping the
# 1.0 m bridge corridor passable (2 x (0.165+0.07) = 0.47 < 1.0).
footprint: [[-0.21, -0.165], [-0.21, 0.165], [0.21, 0.165], [0.21, -0.165]]
footprint_padding: 0.07
transform_tolerance: 0.5

# Each sensor gets its OWN obstacle layer (combined by max). With a shared
# layer, clearing is 2D and cross-sensor: Hokuyo rays passing OVER the
# stool base or BESIDE thin tripod legs at its scan plane were erasing the
# Mid-360's marks in those cells 40x/s, while the Mid-360 re-marked at only
# 10 Hz. Separate layers = each sensor can only clear its own evidence.
# (Layer names contain "obstacles" so clear_costmap_recovery still clears
# them.)
obstacles_scan:
  observation_sources: scan
  scan:
    sensor_frame: laser
    data_type: LaserScan
    topic: scan
    marking: true
    clearing: true
    obstacle_range: 5.5
    raytrace_range: 6.5
    min_obstacle_height: -1.0
    max_obstacle_height: 1.0

obstacles_mid360:
  # The mid360_filter node already applied the height band relative to
  # base_link and publishes IN base_link frame (TF-free, drift-immune);
  # the costmap-side height filter stays wide open.
  observation_sources: mid360
  mid360:
    sensor_frame: base_link
    data_type: PointCloud2
    topic: mid360/obstacles
    marking: true
    clearing: true
    obstacle_range: 4.0
    raytrace_range: 5.0
    min_obstacle_height: -10.0
    max_obstacle_height: 10.0

# inflation_radius 0.22 is the practical minimum: the inscribed radius of
# the padded footprint is ~0.21 (the robot's own half-width) and inflation
# must cover it, or the global planner plans paths the footprint check then
# rejects. High cost_scaling makes the cost cushion beyond that decay fast,
# so paths hug obstacles as closely as the geometry truly allows.
# Wider, gentler cushion: with a steep gradient (scaling 10) the optimal
# path skimmed the very edge of the tripod legs' inflation ring (~5 cm body
# margin through the turn). 0.30/6.0 pushes routes ~10 cm further out and
# rounds the turns. Must stay >= inscribed radius (0.165+0.07=0.235).
inflater_layer:
  inflation_radius: 0.30
  cost_scaling_factor: 6.0

# Local planner, based on Clearpath's jackal_navigation melodic defaults
# (TrajectoryPlannerROS), with accelerations softened for simulation in a VM.
TrajectoryPlannerROS:
  # Robot configuration. Accelerations kept gentle: hard braking pitches the
  # chassis and shakes the sensors (and looks bad in demos).
  acc_lim_x: 2.0
  acc_lim_theta: 6.0
  max_vel_x: 0.5
  min_vel_x: 0.1
  max_vel_theta: 1.0
  min_vel_theta: -1.0
  min_in_place_vel_theta: 0.314
  escape_vel: -0.2
  holonomic_robot: false

  # Goal tolerance
  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.30
  latch_xy_goal_tolerance: false

  # Forward simulation. Generous sampling: entering the ~1 m bridge gap
  # needs precise alignment, and a coarse trajectory search keeps failing
  # there and triggering recovery spins.
  sim_time: 2.0
  sim_granularity: 0.02
  vx_samples: 10
  vtheta_samples: 40

  # Read by rotate_recovery: spin SLOWLY. Skid-steer in-place rotation
  # slips the wheels and degrades AMCL; fast recovery spins were leaving
  # the robot mislocalized and unable to plan afterwards.
  max_rotational_vel: 0.6
  min_in_place_rotational_vel: 0.3

  # Trajectory scoring. occdist_scale raised: high-cost (near-obstacle)
  # cells only lower a trajectory's score, they never hard-reject it - with
  # 0.02 that penalty was so weak the planner happily grazed obstacles on
  # complex maneuvers whenever it shortened the path.
  meter_scoring: true
  pdist_scale: 0.75
  gdist_scale: 0.8
  occdist_scale: 0.1
  dwa: true

  oscillation_reset_dist: 0.05

# Local planner, based on Clearpath's jackal_navigation melodic defaults
# (TrajectoryPlannerROS), with accelerations softened for simulation in a VM.
TrajectoryPlannerROS:
  # Robot configuration
  acc_lim_x: 5.0
  acc_lim_theta: 10.0
  max_vel_x: 0.5
  min_vel_x: 0.1
  max_vel_theta: 1.0
  min_vel_theta: -1.0
  min_in_place_vel_theta: 0.314
  escape_vel: -0.2
  holonomic_robot: false

  # Goal tolerance
  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.30
  latch_xy_goal_tolerance: false

  # Forward simulation
  sim_time: 2.0
  sim_granularity: 0.02
  vx_samples: 6
  vtheta_samples: 20

  # Trajectory scoring
  meter_scoring: true
  pdist_scale: 0.75
  gdist_scale: 0.8
  occdist_scale: 0.02
  dwa: true

  oscillation_reset_dist: 0.05

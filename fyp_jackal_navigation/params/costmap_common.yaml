# Shared costmap configuration, loaded into BOTH the global and local costmap
# namespaces. Footprint values are the Clearpath Jackal defaults.
#
# The key idea of this FYP:
#   * "scan"   = Hokuyo UST-10 (2D). Sees walls and the bridge supports, but
#                NOT the bridge deck overhead or the box on the tripod.
#   * "mid360" = Livox Mid-360 (3D). Sees everything; points are filtered by
#                height so that only obstacles within the robot's vertical
#                travel envelope are marked:
#                  min_obstacle_height 0.08 -> drop ground returns
#                  max_obstacle_height 0.55 -> anything above this the robot
#                                              can pass UNDER (bridge deck!)
#                (heights are in the costmap's global frame, z=0 at floor)
#
# NOTE: the livox_laser_simulation plugin publishes the legacy
# sensor_msgs/PointCloud type, hence data_type: PointCloud. On the real
# robot the Livox ROS driver publishes PointCloud2 - change data_type (and
# topic / sensor_frame) accordingly.

footprint: [[-0.21, -0.165], [-0.21, 0.165], [0.21, 0.165], [0.21, -0.165]]
footprint_padding: 0.08
transform_tolerance: 0.5

obstacles_layer:
  observation_sources: scan mid360
  scan:
    sensor_frame: front_laser
    data_type: LaserScan
    topic: front/scan
    marking: true
    clearing: true
    obstacle_range: 5.5
    raytrace_range: 6.5
    min_obstacle_height: -1.0
    max_obstacle_height: 1.0
  mid360:
    sensor_frame: mid360_link
    data_type: PointCloud
    topic: mid360/points
    marking: true
    clearing: true
    obstacle_range: 5.5
    raytrace_range: 6.5
    min_obstacle_height: 0.08
    max_obstacle_height: 0.55

inflater_layer:
  inflation_radius: 0.30
  cost_scaling_factor: 5.0
